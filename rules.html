<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Rules</title>

<link rel="stylesheet" href="rules.css">
</head>

<body>

<div class="window">

  <div class="titlebar">
    <span>📋 Terms of Service</span>
    <span class="blink">_ □ X</span>
  </div>

  <div class="content">

    <div class="box" id="rulesText"></div>

    <div class="buttons">

      <div class="leftBtns">
        <button onclick="toggleLanguage()">🌐 EN / SI</button>
      </div>

      <div class="rightBtns">
        <button onclick="acceptRules()">OK</button>
        <button onclick="denyRules()">Cancel</button>
      </div>

    </div>

    <div class="status" id="status"></div>

  </div>

</div>

<script src="rules.js"></script>

</body>
</html>
