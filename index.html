<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>X Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:white;
}

#auth {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#111;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input, textarea {
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:5px;
  box-sizing:border-box;
}

button {
  padding:10px;
  background:#1d9bf0;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:5px;
  width:100%;
}

.layout {
  display:none;
  flex-direction:column;
  min-height:100vh;
}

.feed {
  flex:1;
  padding:20px;
  padding-bottom:80px;
}

.tweet {
  border-bottom:1px solid #333;
  padding:10px;
  display:flex;
  gap:10px;
  align-items:flex-start;
}

.tweet-body {
  flex:1;
}

.tweet-user {
  cursor:pointer;
}

#friendsPage, #profilePage {
  display:none;
  padding:20px;
}

.bottom-nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:55px;
  background:#111;
  border-top:1px solid #333;
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-size:20px;
}

.bottom-nav span {
  cursor:pointer;
}

/* AVATARS */
.avatar {
  width:40px;
  height:40px;
  border-radius:50%;
  background:#1d9bf0;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  flex-shrink:0;
}

.avatar-small {
  width:32px;
  height:32px;
  font-size:14px;
}

.avatar-large {
  width:100px;
  height:100px;
  font-size:36px;
  margin:0 auto 10px auto;
}

.profile-header {
  text-align:center;
  margin-bottom:20px;
}

.photo-edit {
  text-align:center;
  margin-bottom:20px;
}

.photo-edit input[type="file"] {
  background:#111;
  color:white;
  border:1px solid #333;
}

.hidden {
  display:none !important;
}

/* COMMENTS */
.comment-toggle {
  cursor:pointer;
  color:#71767b;
  font-size:14px;
  margin-top:6px;
}

.comments-section {
  margin-top:10px;
  padding-left:12px;
  border-left:2px solid #333;
}

.comment-item {
  display:flex;
  gap:8px;
  margin:8px 0;
  align-items:flex-start;
}

.comment-item p {
  margin:2px 0 0 0;
  font-size:14px;
}

.comment-input-row {
  display:flex;
  gap:8px;
  margin-top:8px;
}

.comment-input-row input {
  margin:0;
  flex:1;
}

.comment-input-row button {
  width:auto;
  padding:8px 14px;
}

.like-row button {
  width:auto;
  padding:6px 12px;
  margin-left:8px;
}

</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="box">

    <div id="loginBox">
      <h2>Login</h2>
      <input id="loginUser" type="email" placeholder="Email">
      <input id="loginPass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <button onclick="showRegister()">Register</button>
    </div>

    <div id="registerBox" style="display:none;">
      <h2>Register</h2>
      <input id="regUserName" placeholder="Username">
      <input id="regUser" type="email" placeholder="Email">
      <input id="regPass" type="password" placeholder="Password">
      <button onclick="register()">Register</button>
      <button onclick="showLogin()">Back</button>
    </div>

  </div>
</div>

<!-- APP -->
<div class="layout">

  <div class="feed">
    <textarea id="tweetInput" placeholder="Kaj se dogaja?"></textarea>
    <button onclick="addTweet()">Post</button>
    <div id="tweets"></div>
  </div>

  <!-- FRIENDS -->
  <div id="friendsPage">
    <h2>Friends</h2>
    <input id="searchUser" placeholder="Search user">
    <button onclick="searchUsers()">Search</button>
    <div id="usersList"></div>
    <button onclick="backToFeed()">Back</button>
  </div>

  <!-- PROFILE -->
  <div id="profilePage">
    <div class="profile-header">
      <div id="profileAvatar" class="avatar avatar-large"></div>
      <h2 id="profileName"></h2>
    </div>

    <div id="photoEditWrap" class="photo-edit hidden">
      <input id="profilePicInput" type="file" accept="image/*">
      <button onclick="uploadProfilePic()">Shrani profilno sliko</button>

      <input id="usernameInput" type="text" placeholder="Novo uporabniško ime" style="margin-top:15px;">
      <button onclick="updateUsername()">Shrani uporabniško ime</button>
    </div>

    <button onclick="closeProfile()">Back</button>

    <button id="logoutBtn" class="hidden" style="margin-top:10px;background:#333;" onclick="logout()">Odjava</button>
  </div>

</div>

<!-- NAV -->
<div class="bottom-nav">
  <span onclick="goHome()">🏠</span>
  <span onclick="openFriends()">👥</span>
  <span onclick="addTweet()">➕</span>
  <span>🔔</span>
  <span onclick="openMyProfile()">👤</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  updateDoc,
  doc,
  increment,
  onSnapshot,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDJ7jamMsm5UMZEHAbGkolTmxpd-VLaCWQ",
  authDomain: "twiter-e3dff.firebaseapp.com",
  projectId: "twiter-e3dff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// DOM FIX (KLJUČNO)
const authUI = document.getElementById("auth");
const layout = document.querySelector(".layout");

const loginBox = document.getElementById("loginBox");
const registerBox = document.getElementById("registerBox");

const loginUser = document.getElementById("loginUser");
const loginPass = document.getElementById("loginPass");

const regUserName = document.getElementById("regUserName");
const regUser = document.getElementById("regUser");
const regPass = document.getElementById("regPass");

const tweetInput = document.getElementById("tweetInput");
const tweets = document.getElementById("tweets");

const searchUser = document.getElementById("searchUser");
const usersList = document.getElementById("usersList");

const profilePage = document.getElementById("profilePage");
const profileName = document.getElementById("profileName");
const profileAvatar = document.getElementById("profileAvatar");
const photoEditWrap = document.getElementById("photoEditWrap");
const profilePicInput = document.getElementById("profilePicInput");
const usernameInput = document.getElementById("usernameInput");
const logoutBtn = document.getElementById("logoutBtn");

let usersCache = [];
let unsub = null;
let expandedComments = new Set();

// USERS
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  usersCache = snap.docs.map(d => d.data());
}

function getUserByUid(uid) {
  return usersCache.find(u => u.uid === uid);
}

// AVATARS - rendering helper, uporabi sliko ce obstaja, drugace prva crka uporabnika
function setAvatarEl(el, user, fallbackName) {
  el.innerHTML = "";
  const name = user?.username || fallbackName || "?";

  if (user?.photoURL) {
    el.style.backgroundImage = `url(${user.photoURL})`;
    el.innerText = "";
  } else {
    el.style.backgroundImage = "none";
    el.innerText = name.charAt(0).toUpperCase();
  }
}

function avatarHtml(user, fallbackName, sizeClass) {
  const name = user?.username || fallbackName || "?";
  if (user?.photoURL) {
    return `<div class="avatar ${sizeClass}" style="background-image:url(${user.photoURL})"></div>`;
  }
  return `<div class="avatar ${sizeClass}">${name.charAt(0).toUpperCase()}</div>`;
}

// AUTH STATE
onAuthStateChanged(auth, async (user) => {
  if (user) {
    authUI.style.display = "none";
    layout.style.display = "flex";
    await loadUsers();
    listenTweets();
  } else {
    authUI.style.display = "flex";
    layout.style.display = "none";
  }
});

// REGISTER
async function register() {
  const username = regUserName.value.trim();
  const email = regUser.value.trim();
  const pass = regPass.value;

  if (!username || !email || !pass) {
    alert("Izpolni vsa polja");
    return;
  }

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);

    await addDoc(collection(db, "users"), {
      uid: cred.user.uid,
      username,
      email,
      photoURL: null
    });

    regUserName.value = "";
    regUser.value = "";
    regPass.value = "";

    showLogin();
  } catch (err) {
    console.error(err);
    let msg = "Napaka pri registraciji";
    if (err.code === "auth/email-already-in-use") msg = "Ta email je že registriran";
    if (err.code === "auth/weak-password") msg = "Geslo je preveč šibko (vsaj 6 znakov)";
    if (err.code === "auth/invalid-email") msg = "Neveljaven email naslov";
    alert(msg);
  }
}

// LOGIN
async function login() {
  const email = loginUser.value.trim();
  const pass = loginPass.value;

  if (!email || !pass) {
    alert("Vnesi email in geslo");
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (err) {
    console.error(err);
    alert("Napaka pri prijavi: napačen email ali geslo");
  }
}

// LOGOUT
function logout() {
  if (unsub) {
    unsub();
    unsub = null;
  }
  signOut(auth);
}

// TWEETS
function listenTweets() {
  if (unsub) unsub();

  unsub = onSnapshot(collection(db, "tweets"), (snap) => {
    tweets.innerHTML = "";

    snap.forEach(d => {
      const t = d.data();
      const u = getUserByUid(t.uid);

      const div = document.createElement("div");
      div.className = "tweet";

      div.innerHTML = `
        ${avatarHtml(u, t.user, "avatar-small")}
        <div class="tweet-body">
          <b class="tweet-user" onclick="openProfile('${t.uid}')">${t.user}</b>
          <p>${t.text}</p>
          <div class="like-row">
            ❤️ ${t.likes} 🔁 ${t.retweets}
          </div>
          <div class="comment-toggle" onclick="toggleComments('${d.id}')">💬 ${t.comments} komentarjev</div>
          <div id="comments-${d.id}" class="comments-section" style="display:none;">
            <div id="commentsList-${d.id}"></div>
            <div class="comment-input-row">
              <input id="commentInput-${d.id}" placeholder="Dodaj komentar...">
              <button onclick="addComment('${d.id}')">Objavi</button>
            </div>
          </div>
        </div>
      `;

      tweets.appendChild(div);

      if (expandedComments.has(d.id)) {
        const section = document.getElementById(`comments-${d.id}`);
        if (section) section.style.display = "block";
        loadComments(d.id);
      }
    });
  });
}

// ADD TWEET
async function addTweet() {
  const text = tweetInput.value.trim();
  if (!text) return;

  const user = auth.currentUser;
  if (!user) return;

  const dbUser = usersCache.find(u => u.uid === user.uid);

  try {
    await addDoc(collection(db, "tweets"), {
      uid: user.uid,
      user: dbUser?.username || user.email,
      text,
      likes: 0,
      comments: 0,
      retweets: 0,
      created: Date.now()
    });

    tweetInput.value = "";
  } catch (err) {
    console.error(err);
    alert("Napaka pri objavi tweeta");
  }
}

// LIKE
async function like(id) {
  try {
    await updateDoc(doc(db, "tweets", id), {
      likes: increment(1)
    });
  } catch (err) {
    console.error(err);
  }
}

// KOMENTARJI
async function toggleComments(tweetId) {
  const section = document.getElementById(`comments-${tweetId}`);
  if (!section) return;

  const isHidden = section.style.display === "none" || !section.style.display;

  if (isHidden) {
    expandedComments.add(tweetId);
    section.style.display = "block";
    await loadComments(tweetId);
  } else {
    expandedComments.delete(tweetId);
    section.style.display = "none";
  }
}

async function loadComments(tweetId) {
  const listEl = document.getElementById(`commentsList-${tweetId}`);
  if (!listEl) return;

  try {
    const q = query(collection(db, "comments"), where("tweetId", "==", tweetId));
    const snap = await getDocs(q);

    const comments = snap.docs
      .map(d => d.data())
      .sort((a, b) => a.created - b.created);

    listEl.innerHTML = comments
      .map(c => {
        const u = getUserByUid(c.uid);
        return `
          <div class="comment-item">
            ${avatarHtml(u, c.user, "avatar-small")}
            <div>
              <b>${c.user}</b>
              <p>${c.text}</p>
            </div>
          </div>
        `;
      })
      .join("");
  } catch (err) {
    console.error(err);
    listEl.innerHTML = "<p>Napaka pri nalaganju komentarjev</p>";
  }
}

async function addComment(tweetId) {
  const input = document.getElementById(`commentInput-${tweetId}`);
  if (!input) return;

  const text = input.value.trim();
  if (!text) return;

  const user = auth.currentUser;
  if (!user) return;

  const dbUser = getUserByUid(user.uid);

  try {
    await addDoc(collection(db, "comments"), {
      tweetId,
      uid: user.uid,
      user: dbUser?.username || user.email,
      text,
      created: Date.now()
    });

    await updateDoc(doc(db, "tweets", tweetId), {
      comments: increment(1)
    });

    input.value = "";
    await loadComments(tweetId);
  } catch (err) {
    console.error(err);
    alert("Napaka pri dodajanju komentarja");
  }
}

// NAVIGACIJA - poskrbi, da je vedno vidna samo ena stran
function hideAllPages() {
  document.querySelector(".feed").style.display = "none";
  document.getElementById("friendsPage").style.display = "none";
  profilePage.style.display = "none";
}

// FRIENDS
function openFriends() {
  hideAllPages();
  document.getElementById("friendsPage").style.display = "block";
}

function backToFeed() {
  hideAllPages();
  document.querySelector(".feed").style.display = "block";
}

// SEARCH USERS
async function searchUsers() {
  const q = searchUser.value.toLowerCase();
  usersList.innerHTML = "";

  usersCache
    .filter(u => (u.username || "").toLowerCase().includes(q))
    .forEach(u => {
      const div = document.createElement("div");
      div.style.display = "flex";
      div.style.alignItems = "center";
      div.style.gap = "10px";
      div.style.margin = "8px 0";
      div.innerHTML = `
        ${avatarHtml(u, u.username, "avatar-small")}
        <b style="flex:1">${u.username || u.email}</b>
        <button style="width:auto;padding:8px 14px;" onclick="addFriend('${u.uid}')">Add</button>
      `;
      usersList.appendChild(div);
    });
}

// ADD FRIEND
async function addFriend(uid) {
  const user = auth.currentUser;
  if (!user) return;

  if (user.uid === uid) {
    alert("Ne moreš dodati samega sebe");
    return;
  }

  try {
    const q = query(
      collection(db, "friends"),
      where("from", "==", user.uid),
      where("to", "==", uid)
    );
    const existing = await getDocs(q);

    if (!existing.empty) {
      alert("Ta uporabnik je že tvoj prijatelj");
      return;
    }

    await addDoc(collection(db, "friends"), {
      from: user.uid,
      to: uid,
      status: "accepted",
      created: Date.now()
    });

    alert("Added friend");
  } catch (err) {
    console.error(err);
    alert("Napaka pri dodajanju prijatelja");
  }
}

// SLIKA - pomanjsa in stisne sliko preden jo shranimo v Firestore (base64)
function resizeImage(file, maxSize = 200, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = (e) => {
      const img = new Image();

      img.onload = () => {
        let w = img.width;
        let h = img.height;

        if (w > h) {
          if (w > maxSize) {
            h = Math.round(h * (maxSize / w));
            w = maxSize;
          }
        } else {
          if (h > maxSize) {
            w = Math.round(w * (maxSize / h));
            h = maxSize;
          }
        }

        const canvas = document.createElement("canvas");
        canvas.width = w;
        canvas.height = h;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, w, h);

        resolve(canvas.toDataURL("image/jpeg", quality));
      };

      img.onerror = reject;
      img.src = e.target.result;
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// SHRANI PROFILNO SLIKO
async function uploadProfilePic() {
  const file = profilePicInput.files[0];
  if (!file) {
    alert("Najprej izberi sliko");
    return;
  }

  const user = auth.currentUser;

  try {
    const dataUrl = await resizeImage(file, 200, 0.7);

    const q = query(collection(db, "users"), where("uid", "==", user.uid));
    const snap = await getDocs(q);

    if (snap.empty) {
      alert("Uporabniškega profila ni mogoče najti");
      return;
    }

    const userDocId = snap.docs[0].id;
    await updateDoc(doc(db, "users", userDocId), { photoURL: dataUrl });

    await loadUsers();
    setAvatarEl(profileAvatar, getUserByUid(user.uid), profileName.innerText);
    profilePicInput.value = "";
    alert("Profilna slika posodobljena");
  } catch (err) {
    console.error(err);
    alert("Napaka pri nalaganju slike");
  }
}

// SHRANI UPORABNIŠKO IME
async function updateUsername() {
  const newName = usernameInput.value.trim();
  if (!newName) {
    alert("Vnesi novo uporabniško ime");
    return;
  }

  const user = auth.currentUser;

  try {
    const q = query(collection(db, "users"), where("uid", "==", user.uid));
    const snap = await getDocs(q);

    if (snap.empty) {
      alert("Uporabniškega profila ni mogoče najti");
      return;
    }

    const userDocId = snap.docs[0].id;
    await updateDoc(doc(db, "users", userDocId), { username: newName });

    await loadUsers();

    const updatedUser = getUserByUid(user.uid);
    profileName.innerText = updatedUser?.username || newName;
    setAvatarEl(profileAvatar, updatedUser, newName);
    usernameInput.value = "";

    alert("Uporabniško ime posodobljeno. Opomba: že objavljeni tweeti ohranijo staro ime.");
  } catch (err) {
    console.error(err);
    alert("Napaka pri posodabljanju imena");
  }
}

// PROFILE
async function openProfile(uid) {
  hideAllPages();
  profilePage.style.display = "block";

  const user = getUserByUid(uid);
  profileName.innerText = user?.username || "Profile";
  setAvatarEl(profileAvatar, user, user?.username);

  const isOwnProfile = auth.currentUser && auth.currentUser.uid === uid;
  photoEditWrap.classList.toggle("hidden", !isOwnProfile);
  logoutBtn.classList.toggle("hidden", !isOwnProfile);

  if (isOwnProfile) {
    usernameInput.value = user?.username || "";
  }
}

function closeProfile() {
  hideAllPages();
  document.querySelector(".feed").style.display = "block";
}

function openMyProfile() {
  if (!auth.currentUser) return;
  openProfile(auth.currentUser.uid);
}

function goHome() {
  backToFeed();
}

// UI
function showRegister() {
  loginBox.style.display = "none";
  registerBox.style.display = "block";
}

function showLogin() {
  loginBox.style.display = "block";
  registerBox.style.display = "none";
}

// EXPORT TO WINDOW
window.login = login;
window.register = register;
window.addTweet = addTweet;
window.like = like;
window.openFriends = openFriends;
window.backToFeed = backToFeed;
window.searchUsers = searchUsers;
window.addFriend = addFriend;
window.openProfile = openProfile;
window.openMyProfile = openMyProfile;
window.closeProfile = closeProfile;
window.goHome = goHome;
window.showRegister = showRegister;
window.showLogin = showLogin;
window.uploadProfilePic = uploadProfilePic;
window.updateUsername = updateUsername;
window.toggleComments = toggleComments;
window.addComment = addComment;
window.logout = logout;

</script>

</body>
</html>
