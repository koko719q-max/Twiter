<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>X Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="box">

    <div id="loginBox">
      <h2>Login</h2>
      <input id="loginUser" type="email" placeholder="Email">
      <input id="loginPass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <button onclick="showRegister()">Register</button>
    </div>

    <div id="registerBox" style="display:none;">
      <h2>Register</h2>
      <input id="regUserName" placeholder="Username">
      <input id="regUser" type="email" placeholder="Email">
      <input id="regPass" type="password" placeholder="Password">
      <button onclick="register()">Register</button>
      <button onclick="showLogin()">Back</button>
    </div>

  </div>
</div>

<!-- APP -->
<div class="layout">

  <div class="feed">
    <!-- Tweet compose box -->
    <div class="tweet-compose">
      <textarea id="tweetInput" placeholder="Kaj se dogaja?"></textarea>

      <!-- Image preview -->
      <div id="imagePreviewWrap">
        <img id="imagePreview" src="" alt="Predogled slike">
        <button id="removeImageBtn" onclick="removeImage()" title="Odstrani sliko">✕</button>
      </div>

      <!-- Video preview -->
      <div id="videoPreviewWrap">
        <video id="videoPreview" controls></video>
        <button id="removeVideoBtn" onclick="removeVideo()" title="Odstrani video">✕</button>
      </div>

      <!-- Progress bar za nalaganje videa -->
      <div id="uploadProgressWrap" class="upload-progress-wrap">
        <div id="uploadProgressBar" class="upload-progress-bar"></div>
      </div>

      <div class="tweet-actions-row">
        <div class="tweet-media-btns">
          <!-- Hidden file input - slika -->
          <input
            id="imageInput"
            type="file"
            accept="image/jpeg,image/png,image/gif,image/webp"
            onchange="previewImage(event)"
          >
          <!-- Image button triggers file input -->
          <button class="media-btn" onclick="document.getElementById('imageInput').click()" title="Dodaj sliko">🖼️</button>

          <!-- Hidden file input - video -->
          <input
            id="videoInput"
            type="file"
            accept="video/mp4,video/webm,video/quicktime"
            onchange="previewVideo(event)"
          >
          <!-- Video button triggers file input -->
          <button class="media-btn" onclick="document.getElementById('videoInput').click()" title="Dodaj video">🎥</button>
        </div>
        <button onclick="addTweet()">Post</button>
      </div>
    </div>

    <div id="tweets"></div>
  </div>

  <!-- FRIENDS -->
  <div id="friendsPage">
    <h2>Friends</h2>

    <h3>Zahteve za prijateljstvo</h3>
    <div id="friendRequestsList"></div>

    <h3>Tvoji prijatelji</h3>
    <div id="myFriendsList"></div>

    <h3>Iskanje uporabnikov</h3>
    <input id="searchUser" placeholder="Search user">
    <button onclick="searchUsers()">Search</button>
    <div id="usersList"></div>

    <button onclick="backToFeed()">Back</button>
  </div>

  <!-- PROFILE -->
  <div id="profilePage">
    <div class="profile-header">
      <div id="profileAvatar" class="avatar avatar-large"></div>
      <h2 id="profileName"></h2>
      <div id="profileBadge"></div>
    </div>

    <div id="photoEditWrap" class="photo-edit hidden">
      <input id="profilePicInput" type="file" accept="image/*">
      <button onclick="uploadProfilePic()">Shrani profilno sliko</button>

      <input id="usernameInput" type="text" placeholder="Novo uporabniško ime" style="margin-top:15px;">
      <button onclick="updateUsername()">Shrani uporabniško ime</button>
    </div>

    <button onclick="closeProfile()">Back</button>

    <button id="logoutBtn" class="hidden" style="margin-top:10px;background:#333;" onclick="logout()">Odjava</button>
  </div>

</div>

<!-- NAV -->
<div class="bottom-nav">
  <span onclick="goHome()">🏠</span>
  <span onclick="openFriends()">👥</span>
  <span onclick="addTweet()">➕</span>
  <span>🔔</span>
  <span onclick="openMyProfile()">👤</span>
</div>

<!-- Lightbox za prikaz slik v polni velikosti -->
<div id="lightbox">
  <button id="lightboxClose" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="Slika v polni velikosti">
</div>

<script>
  // ── Image preview before posting ──────────────────────────────
  // OPOMBA: app.js (module script spodaj) povozi te funkcije s svojimi
  // verzijami (ki dodajo resize + povezavo na addTweet), ker se naloži
  // za tem inline scriptom. Te tukaj služijo kot osnovna/varna privzeta
  // implementacija in za jasnost kako deluje preview.

  let selectedImageBase64 = null;

  function previewImage(event) {
    const file = event.target.files[0];
    if (!file) return;

    // Max 5 MB
    if (file.size > 5 * 1024 * 1024) {
      alert('Slika je prevelika. Največja dovoljena velikost je 5 MB.');
      event.target.value = '';
      return;
    }

    // Slika in video se izključujeta - če je izbran video, ga odstranimo
    if (typeof removeVideo === 'function') removeVideo();

    const reader = new FileReader();
    reader.onload = (e) => {
      selectedImageBase64 = e.target.result; // data URL (base64)
      document.getElementById('imagePreview').src = selectedImageBase64;
      document.getElementById('imagePreviewWrap').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  function removeImage() {
    selectedImageBase64 = null;
    document.getElementById('imagePreview').src = '';
    document.getElementById('imagePreviewWrap').style.display = 'none';
    document.getElementById('imageInput').value = '';
  }

  // ── Expose selectedImageBase64 so app.js can read it ──────────
  window.getSelectedImage = () => selectedImageBase64;
  window.clearSelectedImage = () => removeImage();

  // ── Render tweet image inside a tweet card ─────────────────────
  window.renderTweetImage = function(container, imageBase64) {
    if (!imageBase64) return;
    const img = document.createElement('img');
    img.src = imageBase64;
    img.className = 'tweet-image';
    img.alt = 'Tweet slika';
    img.onclick = () => openLightbox(imageBase64);
    container.appendChild(img);
  };

  // ── Video preview before posting ────────────────────────────────
  // Max 50 MB in 120 sekund - dejansko nalaganje v Firebase Storage
  // izvede app.js (potrebuje dostop do `storage`/`auth` instanc).
  const MAX_VIDEO_MB = 50;
  const MAX_VIDEO_DURATION_SEC = 120;
  let selectedVideoFile = null;
  let selectedVideoObjectUrl = null;

  function previewVideo(event) {
    const file = event.target.files[0];
    if (!file) return;

    if (file.size > MAX_VIDEO_MB * 1024 * 1024) {
      alert(`Video je prevelik. Največja dovoljena velikost je ${MAX_VIDEO_MB} MB.`);
      event.target.value = '';
      return;
    }

    const tempUrl = URL.createObjectURL(file);
    const probe = document.createElement('video');
    probe.preload = 'metadata';
    probe.onloadedmetadata = () => {
      if (probe.duration > MAX_VIDEO_DURATION_SEC) {
        URL.revokeObjectURL(tempUrl);
        alert(`Video je predolg. Največja dolžina je ${MAX_VIDEO_DURATION_SEC} sekund.`);
        event.target.value = '';
        return;
      }

      // Slika in video se izključujeta
      removeImage();

      selectedVideoFile = file;
      selectedVideoObjectUrl = tempUrl;
      const preview = document.getElementById('videoPreview');
      preview.src = tempUrl;
      document.getElementById('videoPreviewWrap').style.display = 'block';
    };
    probe.src = tempUrl;
  }

  function removeVideo() {
    selectedVideoFile = null;
    if (selectedVideoObjectUrl) {
      URL.revokeObjectURL(selectedVideoObjectUrl);
      selectedVideoObjectUrl = null;
    }
    const preview = document.getElementById('videoPreview');
    preview.src = '';
    document.getElementById('videoPreviewWrap').style.display = 'none';
    document.getElementById('videoInput').value = '';
  }

  // ── Expose video selection so app.js can read/upload it ─────────
  window.getSelectedVideo = () => selectedVideoFile;
  window.clearSelectedVideo = () => removeVideo();

  // ── Render tweet video inside a tweet card ───────────────────────
  window.renderTweetVideo = function(container, videoUrl) {
    if (!videoUrl) return;
    const video = document.createElement('video');
    video.src = videoUrl;
    video.className = 'tweet-video';
    video.controls = true;
    video.preload = 'metadata';
    container.appendChild(video);
  };

  // ── Lightbox ──────────────────────────────────────────────────
  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('active');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightboxImg').src = '';
  }

  // Close lightbox on background click
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });
</script>

<script type="module" src="app.js"></script>
<script>
for(let i=0;i<20;i++){

  const c=document.createElement("div");

  c.className="floating-circle";

  const size=Math.random()*120+40;

  c.style.width=size+"px";
  c.style.height=size+"px";

  c.style.left=Math.random()*100+"vw";

  c.style.background=
    `rgba(${Math.random()*100+100},
           ${Math.random()*100+100},
           255,0.12)`;

  c.style.animationDuration=
    (Math.random()*20+15)+"s";

  document.body.appendChild(c);
}
</script>
</body>
</html>
