<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>Twitter Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; margin:0; background:#000; color:white; }

#auth {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#111;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input, textarea {
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:5px;
}

button {
  padding:10px;
  background:#1d9bf0;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:5px;
  width:100%;
}

.layout { display:none; }

.sidebar { width:200px; padding:20px; }

.feed { flex:1; padding:20px; }

.tweet {
  border-bottom:1px solid #333;
  padding:10px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="box">

    <div id="loginBox">
      <h2>Login</h2>
      <input id="loginUser" type="email" placeholder="Email">
      <input id="loginPass" type="password" placeholder="Password">
      <button id="loginBtn">Login</button>
      <button id="goRegister">Register</button>
    </div>

    <div id="registerBox" style="display:none;">
      <h2>Register</h2>
      <input id="regUserName" placeholder="Username">
      <input id="regUser" type="email" placeholder="Email">
      <input id="regPass" type="password" placeholder="Password">
      <button id="registerBtn">Register</button>
      <button id="goLogin">Back to Login</button>
    </div>

  </div>
</div>

<!-- APP -->
<div class="layout">
  <div class="sidebar">
    <h2>X</h2>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="feed">
    <textarea id="tweetInput" placeholder="Kaj se dogaja?"></textarea>
    <button id="postBtn">Post</button>
    <div id="tweets"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDJ7jamMsm5UMZEHAbGkolTmxpd-VLaCWQ",
  authDomain: "twiter-e3dff.firebaseapp.com",
  projectId: "twiter-e3dff"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// DOM
const authUI = document.getElementById("auth");
const layout = document.querySelector(".layout");

const loginBox = document.getElementById("loginBox");
const registerBox = document.getElementById("registerBox");

const loginUser = document.getElementById("loginUser");
const loginPass = document.getElementById("loginPass");

const regUserName = document.getElementById("regUserName");
const regUser = document.getElementById("regUser");
const regPass = document.getElementById("regPass");

const tweetInput = document.getElementById("tweetInput");
const tweets = document.getElementById("tweets");

const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");
const logoutBtn = document.getElementById("logoutBtn");
const postBtn = document.getElementById("postBtn");

// SWITCH UI
document.getElementById("goRegister").onclick = () => {
  loginBox.style.display = "none";
  registerBox.style.display = "block";
};

document.getElementById("goLogin").onclick = () => {
  loginBox.style.display = "block";
  registerBox.style.display = "none";
};

// REGISTER
registerBtn.onclick = async () => {
  try {
    const cred = await createUserWithEmailAndPassword(
      auth,
      regUser.value,
      regPass.value
    );

    await addDoc(collection(db, "users"), {
      uid: cred.user.uid,
      username: regUserName.value,
      email: regUser.value
    });

    alert("Registered!");
  } catch (e) {
    alert(e.message);
  }
};

// LOGIN
loginBtn.onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, loginUser.value, loginPass.value);
  } catch (e) {
    alert(e.message);
  }
};

// LOGOUT
logoutBtn.onclick = () => signOut(auth);

// AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
    authUI.style.display = "none";
    layout.style.display = "flex";
    loadTweets();
  } else {
    authUI.style.display = "flex";
    layout.style.display = "none";
  }
});

// POST TWEET
postBtn.onclick = async () => {
  if (!tweetInput.value.trim()) return;

  await addDoc(collection(db, "tweets"), {
    user: auth.currentUser.email,
    text: tweetInput.value,
    likes: 0
  });

  tweetInput.value = "";
};

// LOAD TWEETS
function loadTweets() {
  onSnapshot(collection(db, "tweets"), (snap) => {
    tweets.innerHTML = "";

    snap.forEach((d) => {
      const t = d.data();

      const div = document.createElement("div");
      div.className = "tweet";

      div.innerHTML = `
        <b>${t.user}</b>
        <p>${t.text}</p>
        ❤️ ${t.likes}
        <button onclick="likeTweet('${d.id}')">Like</button>
      `;

      tweets.appendChild(div);
    });
  });
}

// LIKE
window.likeTweet = async (id) => {
  await updateDoc(doc(db, "tweets", id), {
    likes: increment(1)
  });
};
</script>
<!-- 📲 MOBILE NAV -->
<div class="bottom-nav">
  <span onclick="goHome()">🏠</span>
  <span onclick="search()">🔍</span>
  <span onclick="addTweet()">➕</span>
  <span onclick="notifications()">🔔</span>
  <span onclick="openMyProfile()">👤</span>
</div>
</body>
</html>
