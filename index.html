<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>X Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:white;
}

#auth {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#111;
  padding:20px;
  border-radius:10px;
  width:300px;
}

input, textarea {
  width:100%;
  margin:8px 0;
  padding:10px;
  border:none;
  border-radius:5px;
}

button {
  padding:10px;
  background:#1d9bf0;
  border:none;
  color:white;
  cursor:pointer;
  border-radius:5px;
  width:100%;
}

.layout {
  display:none;
  flex-direction:column;
  min-height:100vh;
}

.feed {
  flex:1;
  padding:20px;
  padding-bottom:80px;
}

.tweet {
  border-bottom:1px solid #333;
  padding:10px;
}

.tweet-header {
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar {
  width:35px;
  height:35px;
  border-radius:50%;
  object-fit:cover;
}

#friendsPage, #profilePage {
  display:none;
  padding:20px;
}

.profile-box {
  text-align:center;
  margin-bottom:20px;
}

.profile-avatar {
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
}

.bottom-nav {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:55px;
  background:#111;
  border-top:1px solid #333;
  display:flex;
  justify-content:space-around;
  align-items:center;
  font-size:20px;
}

.bottom-nav span {
  cursor:pointer;
}
</style>
</head>

<body>

<div id="auth">
  <div class="box">

    <div id="loginBox">
      <h2>Login</h2>
      <input id="loginUser" type="email" placeholder="Email">
      <input id="loginPass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <button onclick="showRegister()">Register</button>
    </div>

    <div id="registerBox" style="display:none;">
      <h2>Register</h2>
      <input id="regUserName" placeholder="Username">
      <input id="regUser" type="email" placeholder="Email">
      <input id="regPass" type="password" placeholder="Password">
      <input id="regAvatar" type="file" accept="image/*">
      <button onclick="register()">Register</button>
      <button onclick="showLogin()">Back</button>
    </div>

  </div>
</div>

<div class="layout">

  <div class="feed">
    <textarea id="tweetInput" placeholder="Kaj se dogaja?"></textarea>
    <button onclick="addTweet()">Post</button>
    <div id="tweets"></div>
  </div>

  <div id="friendsPage">
    <h2>Friends</h2>
    <input id="searchUser" placeholder="Search user">
    <button onclick="searchUsers()">Search</button>
    <div id="usersList"></div>
    <button onclick="backToFeed()">Back</button>
  </div>

  <div id="profilePage">
    <div class="profile-box">
      <img id="profileAvatar" class="profile-avatar">
      <h2 id="profileName"></h2>
    </div>
    <div id="profileTweets"></div>
    <button onclick="closeProfile()">Back</button>
  </div>

</div>

<div class="bottom-nav">
  <span onclick="goHome()">🏠</span>
  <span onclick="openFriends()">👥</span>
  <span onclick="addTweet()">➕</span>
  <span>🔔</span>
  <span onclick="openMyProfile()">👤</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {  
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  updateDoc,
  doc,
  increment,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDJ7jamMsm5UMZEHAbGkolTmxpd-VLaCWQ",
  authDomain: "twiter-e3dff.firebaseapp.com",
  projectId: "twiter-e3dff",
  storageBucket: "twiter-e3dff.appspot.com"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// UI
const authUI = document.getElementById("auth");
const layout = document.querySelector(".layout");

const loginUser = document.getElementById("loginUser");   // 🔥 FIX
const loginPass = document.getElementById("loginPass");   // 🔥 FIX

const regUserName = document.getElementById("regUserName");
const regUser = document.getElementById("regUser");
const regPass = document.getElementById("regPass");
const regAvatar = document.getElementById("regAvatar");

const tweetInput = document.getElementById("tweetInput");
const tweets = document.getElementById("tweets");

const profilePage = document.getElementById("profilePage");
const profileName = document.getElementById("profileName");
const profileAvatar = document.getElementById("profileAvatar");
const profileTweets = document.getElementById("profileTweets");

let usersCache = [];
let unsub = null;

// USERS
async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));
  usersCache = snap.docs.map(d => d.data());
}

// AUTH
onAuthStateChanged(auth, async (user) => {
  if (user) {
    authUI.style.display = "none";
    layout.style.display = "flex";
    await loadUsers();
  } else {
    authUI.style.display = "flex";
    layout.style.display = "none";
  }
});

// REGISTER
async function register() {
  const username = regUserName.value;
  const email = regUser.value;
  const pass = regPass.value;
  const file = regAvatar.files[0];

  const cred = await createUserWithEmailAndPassword(auth, email, pass);

  let photoURL = "";

  if (file) {
    const imgRef = ref(storage, `avatars/${cred.user.uid}`);
    await uploadBytes(imgRef, file);
    photoURL = await getDownloadURL(imgRef);
  }

  await addDoc(collection(db, "users"), {
    uid: cred.user.uid,
    username,
    email,
    photoURL
  });

  showLogin();
}

// LOGIN
async function login() {
  await signInWithEmailAndPassword(auth, loginUser.value, loginPass.value);
}

// PROFILE
async function openProfile(uid) {
  profilePage.style.display = "block";
  document.querySelector(".feed").style.display = "none";

  const user = usersCache.find(u => u.uid === uid);

  profileName.innerText = user?.username || "Profile";
  profileAvatar.src = user?.photoURL || "https://via.placeholder.com/80";
}

// NAV
function closeProfile() {
  profilePage.style.display = "none";
  document.querySelector(".feed").style.display = "block";
}

function openMyProfile() {
  openProfile(auth.currentUser.uid);
}

function goHome() {
  closeProfile();
}

// UI
function showRegister() {
  loginBox.style.display = "none";
  registerBox.style.display = "block";
}

function showLogin() {
  loginBox.style.display = "block";
  registerBox.style.display = "none";
}

// EXPORT
window.login = login;
window.register = register;
window.openProfile = openProfile;
window.openMyProfile = openMyProfile;
window.closeProfile = closeProfile;
window.goHome = goHome;
window.showRegister = showRegister;
window.showLogin = showLogin;

</script>

</body>
</html>
