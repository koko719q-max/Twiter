<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <title>Twitter Clone</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 AUTH -->
<div id="auth">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>Login</h2>

    <input id="loginUser" type="email" placeholder="Email">
    <input id="loginPass" type="password" placeholder="Password">

    <button onclick="login()">Prijava</button>
    <p onclick="showRegister()">No account? Register</p>
  </div>

  <!-- REGISTER -->
  <div id="registerBox" style="display:none;">
    <h2>Register</h2>

    <!-- 🔥 FIX: username + email + password -->
    <input id="regUserName" type="text" placeholder="Username">
    <input id="regUser" type="email" placeholder="Email">
    <input id="regPass" type="password" placeholder="Password">

    <button onclick="register()">Registracija</button>
    <p onclick="showLogin()">Already have account? Login</p>
  </div>

</div>

<!-- 🧑 PROFILE PAGE -->
<div id="profilePage" style="display:none;">
  <button onclick="closeProfile()">⬅ Back</button>
  <h2 id="profileName"></h2>
  <div id="profileTweets"></div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>X</h2>
    <ul>
      <li>🏠 Home</li>
      <li>🔍 Explore</li>
      <li>🔔 Notifications</li>
      <li>✉️ Messages</li>

      <li onclick="openMyProfile()" style="cursor:pointer;">👤 Profile</li>
    </ul>

    <button onclick="logout()">Logout</button>
  </div>

  <!-- FEED -->
  <div class="feed">
    <div class="composer">
      <textarea id="tweetInput" placeholder="Kaj se dogaja?"></textarea>
      <button onclick="addTweet()">Post</button>
    </div>

    <div id="tweets"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <input class="search" placeholder="Search">

    <div class="trends">
      <h3>Trends</h3>
      <p>#AI</p>
      <p>#JavaScript</p>
      <p>#Coding</p>
    </div>
  </div>

</div>

<!-- 📲 MOBILE NAV -->
<div class="bottom-nav">
  <span>🏠</span>
  <span>🔍</span>
  <span>➕</span>
  <span>🔔</span>

  <span onclick="openMyProfile()">👤</span>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
