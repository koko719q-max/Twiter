<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>X Clone</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="box">

    <div id="loginBox">
      <h2>Login</h2>
      <input id="loginUser" type="email" placeholder="Email">
      <input id="loginPass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <button onclick="showRegister()">Register</button>
    </div>

    <div id="registerBox" style="display:none;">
      <h2>Register</h2>
      <input id="regUserName" placeholder="Username">
      <input id="regUser" type="email" placeholder="Email">
      <input id="regPass" type="password" placeholder="Password">
      <button onclick="register()">Register</button>
      <button onclick="showLogin()">Back</button>
    </div>

  </div>
</div>

<!-- APP -->
<div class="layout">

  <div class="feed">
    <!-- Tweet compose box -->
    <div class="tweet-compose">
      <textarea id="tweetInput" placeholder="Kaj se dogaja?"></textarea>

      <!-- Image preview -->
      <div id="imagePreviewWrap">
        <img id="imagePreview" src="" alt="Predogled slike">
        <button id="removeImageBtn" onclick="removeImage()" title="Odstrani sliko">✕</button>
      </div>

      <!-- Video preview -->
      <div id="videoPreviewWrap">
        <video id="videoPreview" controls></video>
        <button id="removeVideoBtn" onclick="removeVideo()" title="Odstrani video">✕</button>
      </div>

      <!-- Progress bar za nalaganje videa -->
      <div id="uploadProgressWrap" class="upload-progress-wrap">
        <div id="uploadProgressBar" class="upload-progress-bar"></div>
      </div>

      <div class="tweet-actions-row">
        <div class="tweet-media-btns">
          <input
            id="imageInput"
            type="file"
            accept="image/jpeg,image/png,image/gif,image/webp"
            onchange="previewImage(event)"
          >
          <button class="media-btn" onclick="document.getElementById('imageInput').click()" title="Dodaj sliko">🖼️</button>

          <input
            id="videoInput"
            type="file"
            accept="video/mp4,video/webm,video/quicktime"
            onchange="previewVideo(event)"
          >
          <button class="media-btn" onclick="document.getElementById('videoInput').click()" title="Dodaj video">🎥</button>
        </div>
        <button onclick="addTweet()">Post</button>
      </div>
    </div>

    <div id="tweets"></div>
  </div>

  <!-- FRIENDS -->
  <div id="friendsPage">
    <h2>Friends</h2>

    <h3>Zahteve za prijateljstvo</h3>
    <div id="friendRequestsList"></div>

    <h3>Tvoji prijatelji</h3>
    <div id="myFriendsList"></div>

    <h3>Iskanje uporabnikov</h3>
    <input id="searchUser" placeholder="Search user">
    <button onclick="searchUsers()">Search</button>
    <div id="usersList"></div>

    <button onclick="backToFeed()">Back</button>
  </div>

  <!-- REWARDS -->
  <div id="rewardsPage"></div>

  <!-- PROFILE -->
  <div id="profilePage">
    <div class="profile-header">
      <div id="profileAvatar" class="avatar avatar-large"></div>
      <h2 id="profileName"></h2>
      <div id="profileBadge"></div>
    </div>

    <div id="photoEditWrap" class="photo-edit hidden">
      <input id="profilePicInput" type="file" accept="image/*">
      <button onclick="uploadProfilePic()">Shrani profilno sliko</button>

      <input id="usernameInput" type="text" placeholder="Novo uporabniško ime" style="margin-top:15px;">
      <button onclick="updateUsername()">Shrani uporabniško ime</button>
    </div>

    <button onclick="closeProfile()">Back</button>

    <button id="logoutBtn" class="hidden" style="margin-top:10px;background:#333;" onclick="logout()">Odjava</button>
  </div>

</div>

<!-- NAV -->
<div class="bottom-nav">
 <span onclick="goHome()">🏠︎</span>
<a href="staff.html">🧑🏽‍💻</a>
  <span onclick="openFriends()">👥</span>
  <span onclick="openRewards()">🎁</span>
  <span onclick="openMyProfile()">👤</span>
</div>

<!-- Lightbox za prikaz slik v polni velikosti -->
<div id="lightbox">
  <button id="lightboxClose" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="Slika v polni velikosti">
</div>

<script>
for(let i=0;i<20;i++){
  const c=document.createElement("div");
  c.className="floating-circle";
  const size=Math.random()*120+40;
  c.style.width=size+"px";
  c.style.height=size+"px";
  c.style.left=Math.random()*100+"vw";
  c.style.background=`rgba(${Math.random()*100+100},${Math.random()*100+100},255,0.12)`;
  c.style.animationDuration=(Math.random()*20+15)+"s";
  document.body.appendChild(c);
}
</script>

<script type="module" src="main.js"></script>

</body>
</html>
